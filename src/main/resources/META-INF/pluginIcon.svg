<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!--  Mitos — Ariadne's thread through the Labyrinth.
        Four language nodes around a central Spring root, connected by a
        thread. Palette matches the in-graph language colours. -->
  <defs>
    <radialGradient id="rootGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#9CCC65"/>
      <stop offset="100%" stop-color="#6DB33F"/>
    </radialGradient>
    <linearGradient id="javaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFB454"/>
      <stop offset="100%" stop-color="#E76F00"/>
    </linearGradient>
    <linearGradient id="jspGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="jsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#F7DF1E"/>
    </linearGradient>
  </defs>

  <!-- Thread (curved Ariadne path winding through the nodes) -->
  <path d="M8 11 Q20 6 32 11 Q35 20 32 29 Q20 34 8 29 Q5 20 8 11 Z"
        fill="none" stroke="#9E9E9E" stroke-width="0.7"
        stroke-dasharray="2,2" opacity="0.55"/>

  <!-- Edges between nodes and root -->
  <g stroke="#6E6E6E" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
    <line x1="11" y1="12" x2="20" y2="20"/>
    <line x1="29" y1="12" x2="20" y2="20"/>
    <line x1="11" y1="28" x2="20" y2="20"/>
    <line x1="29" y1="28" x2="20" y2="20"/>
  </g>

  <!-- Language nodes -->
  <circle cx="11" cy="12" r="3.6" fill="url(#javaGrad)" stroke="#A04E00" stroke-width="0.6"/>
  <circle cx="29" cy="12" r="3.6" fill="url(#jspGrad)"  stroke="#0D3F7B" stroke-width="0.6"/>
  <circle cx="11" cy="28" r="3.6" fill="url(#jsGrad)"   stroke="#7A6F0E" stroke-width="0.6"/>
  <circle cx="29" cy="28" r="3.6" fill="url(#jsGrad)"   stroke="#7A6F0E" stroke-width="0.6"/>

  <!-- Root (Spring-green, larger, with subtle glow halo) -->
  <circle cx="20" cy="20" r="7" fill="none" stroke="#6DB33F" stroke-width="0.6" opacity="0.35"/>
  <circle cx="20" cy="20" r="5.4" fill="url(#rootGlow)" stroke="#3F6F22" stroke-width="0.9"/>

  <!-- Inner highlight on root -->
  <circle cx="18.2" cy="18.2" r="1.4" fill="#FFFFFF" opacity="0.55"/>
</svg>
